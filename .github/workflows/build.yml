name: Build Services

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: python:3.11

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install pytest flask pyjwt

      - name: Run tests (optional)
        run: pytest

      - name: Prepare artifacts
        run: |
          mkdir dist
          cp -r user_service dist/
          cp -r survey_service dist/
          cp -r response_service dist/
          cp -r aggregator_service dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: services
          path: dist/

      - name: Trigger deploy repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: HotCoffeeBean/deploy-repo
          event-type: build_complete